plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

hostnames:
  - private-ip-address

filters:
  instance-state-name: running

compose:
  ansible_host: private_ip_address
  ansible_user: ec2-user
  ansible_ssh_private_key_file: /etc/ansible/dynamic.pem

keyed_groups:
  - key: tags.Name
    prefix: ""
